<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Tìm Kiếm - SNEAK PEAK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body style="background-color: #12151c; color: white;">

    <div class="toast-container-custom" id="toastBox"></div>

    <header class="main-navbar fixed-top">
        <div class="logo">
            <a href="index.html">SNEAK<span>PEAK</span></a>
        </div>
        <nav class="nav-links d-none d-lg-flex">
            <a href="index.html">NEW ARRIVALS</a>
            <a href="category.html?id=1">RUNNING</a>
            <a href="category.html?id=2">FOOTBALL</a>
            <a href="category.html?id=3">BASKETBALL</a>
            <a href="category.html?id=4">SNEAKERS</a>
        </nav>
        
        <div class="nav-search d-none d-md-flex">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search shoes...">
        </div>

        <div class="nav-actions">
            <a href="cart.html" class="icon-link position-relative">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none; font-size: 0.6rem;">0</span>
            </a>
            <div id="userArea">
                <a href="login.html" class="login-btn"><i class="fas fa-user"></i> LOGIN</a>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 120px; min-height: 60vh;">
        <h4 class="fw-bold mb-4" style="font-family: 'Montserrat', sans-serif;">KẾT QUẢ TÌM KIẾM CHO: <span id="searchKeyword" class="text-warning"></span></h4>
        
        <div class="row g-4" id="searchResultsGrid">
            <div class="col-12 text-center text-muted"><i class="fas fa-spinner fa-spin fa-2x"></i> Đang tìm kiếm...</div>
        </div>
    </div>

    <footer class="text-center py-4 mt-5" style="border-top: 1px solid #2a2d34;">
        <p class="text-muted small mb-0">&copy; 2026 SNEAK PEAK. All rights reserved.</p>
    </footer>

    <!-- Modal Quick Add -->
    <div class="modal fade dark-theme-modal" id="quickAddModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: #1e2129; border: 1px solid #3a3f4a;">
          <div class="modal-header border-bottom-0">
            <h5 class="modal-title text-light fw-bold" id="quickAddTitle">Tùy chọn giày</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-0">
            <div id="quickAddOptions"></div>
          </div>
          <div class="modal-footer border-top-0">
            <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-primary-custom" id="btnConfirmQuickAdd" disabled>Thêm vào giỏ</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
