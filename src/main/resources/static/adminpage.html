<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #495057; color: white; }
        .img-thumbnail-table { object-fit: cover; border-radius: 5px; width: 60px; height: 60px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-block">
                <h4 class="text-center mb-4"><i class="fas fa-shoe-prints text-warning"></i> Giày Admin</h4>
                <a href="#" class="active"><i class="fas fa-box"></i> Quản lý sản phẩm</a>
                <a href="#"><i class="fas fa-chart-bar"></i> Thống kê</a>
                <a href="#"><i class="fas fa-users"></i> Khách hàng</a>
                <a href="#" id="btnLogout" class="text-danger mt-5"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Danh sách sản phẩm</h2>
                    <button class="btn btn-primary fw-bold" id="btnAddNew" data-bs-toggle="modal" data-bs-target="#productModal">
                        <i class="fas fa-plus"></i> Thêm sản phẩm
                    </button>
                </div>

                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-body">
                        <form id="searchForm" class="row g-3 align-items-end">
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold mb-1">Tên giày</label>
                                <input type="text" class="form-control" id="searchName" placeholder="Ví dụ: Air Force 1">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label text-muted small fw-bold mb-1">Thương hiệu</label>
                                <select class="form-select" id="searchBrand">
                                    <option value="">Tất cả</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label text-muted small fw-bold mb-1">Danh mục</label>
                                <select class="form-select" id="searchCategory">
                                    <option value="">Tất cả</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold mb-1">Khoảng giá (VNĐ)</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="searchMinPrice" placeholder="Từ">
                                    <span class="input-group-text bg-light border-start-0 border-end-0">-</span>
                                    <input type="number" class="form-control" id="searchMaxPrice" placeholder="Đến">
                                </div>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-dark w-100 fw-bold" id="btnSearch">
                                    <i class="fas fa-search"></i> Lọc
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0" id="productTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th class="ps-3">Ảnh</th>
                                        <th>Tên giày</th>
                                        <th>Thương hiệu</th>
                                        <th>Giá niêm yết</th>
                                        <th>Tồn kho</th>
                                        <th class="text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="6" class="text-center text-muted py-4">Đang tải dữ liệu...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">Sản phẩm</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="productId">
                        
                        <h6 class="text-primary fw-bold border-bottom pb-2">Thông tin chung</h6>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên giày</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Thương hiệu</label>
                                <select class="form-select" id="brandId" required>
                                    <option value="">-- Chọn thương hiệu --</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Danh mục</label>
                                <select class="form-select" id="categoryId" required>
                                    <option value="">-- Chọn danh mục --</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Giá niêm yết (VNĐ)</label>
                            <input type="number" class="form-control" id="price" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả</label>
                            <textarea class="form-control" id="description" rows="3"></textarea>
                        </div>

                        <h6 class="text-success fw-bold border-bottom pb-2 mt-4">Chi tiết biến thể kho</h6>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Size</label>
                                <select class="form-select" id="sizeId">
                                    <option value="">-- Chọn Size --</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Màu sắc</label>
                                <select class="form-select" id="colorId">
                                    <option value="">-- Chọn Màu --</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Số lượng tồn kho</label>
                                <input type="number" class="form-control" id="stockQuantity" value="0">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Link Ảnh Thumbnail</label>
                            <input type="text" class="form-control" id="thumbnailUrl" placeholder="https://...">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-success fw-bold" id="btnSave"><i class="fas fa-save"></i> Lưu hệ thống</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function () {
            // 1. KIỂM TRA QUYỀN TRUY CẬP (ROLE 1)
            const staffToken = localStorage.getItem("staff_token");
            if (!staffToken) {
                alert("Bạn không có quyền truy cập trang Quản trị. Vui lòng đăng nhập!");
                window.location.href = "login.html";
                return;
            }

            const API_URL = "http://localhost:8081/api/";

            // Khởi tạo dữ liệu
            loadSelectData();
            searchProducts();

            // 2. LOAD DỮ LIỆU SELECT (Brands, Categories, Sizes, Colors)
            function loadSelectData() {
                $.get(API_URL + "brands", function (data) {
                    data.forEach(b => {
                        $("#brandId").append(`<option value="${b.id}">${b.name}</option>`);
                        $("#searchBrand").append(`<option value="${b.id}">${b.name}</option>`);
                    });
                });

                $.get(API_URL + "categories", function (data) {
                    data.forEach(c => {
                        $("#categoryId").append(`<option value="${c.id}">${c.name}</option>`);
                        $("#searchCategory").append(`<option value="${c.id}">${c.name}</option>`);
                    });
                });

                // Mock data size/color
                const sizes = [{ id: 1, value: "39" }, { id: 2, value: "40" }, { id: 3, value: "41" }, { id: 4, value: "42" }];
                sizes.forEach(s => $("#sizeId").append(`<option value="${s.id}">Size ${s.value}</option>`));
                const colors = [{ id: 1, name: "Trắng" }, { id: 2, name: "Đen" }, { id: 3, name: "Đỏ" }];
                colors.forEach(c => $("#colorId").append(`<option value="${c.id}">${c.name}</option>`));
            }

            // 3. TÌM KIẾM VÀ RENDER BẢNG
            $("#btnSearch").click(searchProducts);
            
            function searchProducts() {
                const searchName = $("#searchName").val();
                const searchBrand = $("#searchBrand").val();
                const searchCategory = $("#searchCategory").val();
                const searchMinPrice = $("#searchMinPrice").val();
                const searchMaxPrice = $("#searchMaxPrice").val();

                let queryParams = "?";
                if (searchName) queryParams += "name=" + encodeURIComponent(searchName) + "&";
                if (searchBrand) queryParams += "brandId=" + searchBrand + "&";
                if (searchCategory) queryParams += "categoryId=" + searchCategory + "&";
                if (searchMinPrice) queryParams += "minPrice=" + searchMinPrice + "&";
                if (searchMaxPrice) queryParams += "maxPrice=" + searchMaxPrice + "&";

                $("#productTable tbody").html('<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>');

                $.ajax({
                    url: API_URL + "products/" + queryParams,
                    type: "GET",
                    success: function (data) {
                        renderTable(data);
                    },
                    error: function (xhr) {
                        $("#productTable tbody").html('<tr><td colspan="6" class="text-center text-danger py-4">Lỗi kết nối Backend!</td></tr>');
                    }
                });
            }

            function renderTable(products) {
                const $tbody = $("#productTable tbody");
                if (!products || products.length === 0) {
                    $tbody.html('<tr><td colspan="6" class="text-center text-muted py-4">Không tìm thấy sản phẩm nào.</td></tr>');
                    return;
                }

                let html = "";
                products.forEach(p => {
                    const imgSrc = p.thumb || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=150&auto=format&fit=crop';
                    // Mã hóa object để nhét vào thuộc tính data HTML an toàn
                    const pJson = encodeURIComponent(JSON.stringify(p));

                    html += `
                        <tr>
                            <td class="ps-3"><img src="${imgSrc}" class="img-thumbnail-table shadow-sm" alt="img"></td>
                            <td class="fw-bold">${p.name}</td>
                            <td><span class="badge bg-secondary">${p.brandName || 'N/A'}</span></td>
                            <td class="text-danger fw-bold">${p.price ? p.price.toLocaleString('vi-VN') : 0} ₫</td>
                            <td>${p.stock || 0}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-outline-primary btn-edit me-1" data-product="${pJson}" title="Sửa">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${p.id}" data-name="${p.name}" title="Xóa">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                $tbody.html(html);
            }

            // 4. MỞ MODAL THÊM MỚI
            $("#btnAddNew").click(function () {
                $("#modalTitle").text("Thêm sản phẩm mới");
                $("#productForm")[0].reset(); 
                $("#productId").val(''); 
            });

            // 5. MỞ MODAL CẬP NHẬT
            $(document).on("click", ".btn-edit", function () {
                // Giải mã dữ liệu JSON từ nút bấm
                const product = JSON.parse(decodeURIComponent($(this).attr("data-product")));
                
                $("#modalTitle").text("Cập nhật: " + product.name);
                $("#productForm")[0].reset(); 

                $("#productId").val(product.id);
                $("#name").val(product.name);
                $("#price").val(product.price);
                $("#description").val(product.description);
                $("#thumbnailUrl").val(product.thumb);
                $("#stockQuantity").val(product.stock);
                $("#brandId").val(product.brandId);
                $("#categoryId").val(product.categoryId);
                
                $("#productModal").modal('show');
            });

            // 6. LƯU HỆ THỐNG (POST / PUT)
            $("#btnSave").click(function () {
                const payload = {
                    id: $("#productId").val() || null,
                    name: $("#name").val(),
                    price: parseInt($("#price").val()),
                    description: $("#description").val(),
                    brandId: $("#brandId").val() ? parseInt($("#brandId").val()) : null,
                    categoryId: $("#categoryId").val() ? parseInt($("#categoryId").val()) : null,
                    sizeId: $("#sizeId").val() ? parseInt($("#sizeId").val()) : null,
                    colorId: $("#colorId").val() ? parseInt($("#colorId").val()) : null,
                    stock: parseInt($("#stockQuantity").val()),
                    thumb: $("#thumbnailUrl").val()
                };

                if (!payload.name || isNaN(payload.price)) {
                    alert("Vui lòng nhập Tên giày và Giá niêm yết hợp lệ!");
                    return;
                }

                const isUpdate = payload.id !== null;
                const method = isUpdate ? "PUT" : "POST";
                const url = isUpdate ? API_URL + "products/" + payload.id : API_URL + "products";

                const $btn = $(this);
                const originalText = $btn.html();
                $btn.prop("disabled", true).html('<i class="fas fa-spinner fa-spin"></i> Đang xử lý...');

                $.ajax({
                    url: url,
                    type: method,
                    contentType: "application/json",
                    data: JSON.stringify(payload),
                    success: function () {
                        alert(isUpdate ? "Cập nhật thành công!" : "Thêm sản phẩm thành công!");
                        $("#productModal").modal('hide');
                        searchProducts(); 
                    },
                    error: function (xhr) {
                        alert("Lỗi hệ thống: " + xhr.responseText);
                    },
                    complete: function () {
                        $btn.prop("disabled", false).html(originalText);
                    }
                });
            });

            // 7. XÓA SẢN PHẨM
            $(document).on("click", ".btn-delete", function () {
                const id = $(this).data("id");
                const name = $(this).data("name");

                if (confirm(`Bạn có chắc chắn muốn xóa giày "${name}"?\nHành động này không thể hoàn tác!`)) {
                    $.ajax({
                        url: API_URL + "products/" + id,
                        type: "DELETE",
                        success: function () {
                            alert("Đã xóa thành công!");
                            searchProducts(); 
                        },
                        error: function () {
                            alert("Đã xảy ra lỗi khi xóa.");
                        }
                    });
                }
            });

            // 8. ĐĂNG XUẤT
            $("#btnLogout").click(function (e) {
                e.preventDefault();
                localStorage.removeItem("staff_token"); 
                window.location.href = "login.html"; 
            });
        });
    </script>
</body>
</html>
