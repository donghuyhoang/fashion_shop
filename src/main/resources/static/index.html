<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-img { height: 250px; object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-shoe-prints text-warning"></i> THT - SHOP </a>
            
            <div class="ms-auto" id="userArea">
                <a href="login.html" class="btn btn-outline-light btn-sm"><i class="fas fa-user"></i> Đăng Nhập / Đăng Ký</a>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <div class="row mb-5 justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-sm border-0 bg-white rounded-3">
                    <div class="card-body p-3">
                        <form id="searchForm" class="row g-2 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label text-muted small fw-bold mb-1"><i class="fas fa-font"></i> Tên giày</label>
                                <input type="text" class="form-control form-control-sm" id="searchName" placeholder="Ví dụ: Air Force, Jordan...">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold mb-1"><i class="fas fa-tag"></i> Thương hiệu</label>
                                <select class="form-select form-select-sm" id="searchBrand">
                                    <option value="">Tất cả thương hiệu</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label text-muted small fw-bold mb-1"><i class="fas fa-list"></i> Danh mục</label>
                                <select class="form-select form-select-sm" id="searchCategory">
                                    <option value="">Tất cả danh mục</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-warning btn-sm w-100 fw-bold" id="btnSearch">
                                    <i class="fas fa-search"></i> Lọc
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row" id="productGrid">
            </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
