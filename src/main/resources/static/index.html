<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; padding-top: 20px; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; }
        .sidebar a:hover, .sidebar a.active { background-color: #495057; color: white; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar d-none d-md-block">
                <h4 class="text-center mb-4"><i class="fas fa-shoe-prints"></i> Giày Admin</h4>
                <a href="#" class="active"><i class="fas fa-box"></i> Quản lý sản phẩm</a>
                <a href="#"><i class="fas fa-chart-bar"></i> Thống kê</a>
                <a href="#"><i class="fas fa-users"></i> Khách hàng</a>
                <a href="#" id="btnLogout" class="text-danger mt-5"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Danh sách sản phẩm</h2>
                    <button class="btn btn-primary" id="btnAddNew" data-bs-toggle="modal" data-bs-target="#productModal">
                        <i class="fas fa-plus"></i> Thêm sản phẩm
                    </button>
                </div>

<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form id="searchForm" class="row g-3">
            <div class="col-md-3">
            <label class="form-label text-muted small mb-1">Tên giày</label>
            <input type="text" class="form-control" id="searchName" placeholder="Ví dụ: Air Force 1">
            </div>
            <div class="col-md-2">
            <label class="form-label text-muted small mb-1">Thương hiệu</label>
            <select class="form-select" id="searchBrand">
            <option value="">Tất cả</option>
            <option value="1">Nike</option>
            <option value="2">Adidas</option>
            <option value="3">Puma</option>
            </select>
            </div>
            <div class="col-md-2">
            <label class="form-label text-muted small mb-1">Danh mục</label>
            <select class="form-select" id="searchCategory">
            <option value="">Tất cả</option>
            <option value="1">Giày Thể Thao</option>
            <option value="2">Giày Tây</option>
            </select>
            </div>
            <div class="col-md-3">
            <label class="form-label text-muted small mb-1">Khoảng giá (VNĐ)</label>
            <div class="input-group">
            <input type="number" class="form-control" id="searchMinPrice" placeholder="Từ">
            <span class="input-group-text">-</span>
            <input type="number" class="form-control" id="searchMaxPrice" placeholder="Đến">
            </div>
            </div>
            <div class="col-md-2 d-flex align-items-end">
            <button type="button" class="btn btn-dark w-100" id="btnSearch">
            <i class="fas fa-search"></i> Lọc
            </button>
            </div>
        </form>
    </div>
</div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <table class="table table-hover align-middle" id="productTable">
                            <thead class="table-light">
                                <tr>
                                    <th>Ảnh</th>
                                    <th>Tên giày</th>
                                    <th>Thương hiệu</th>
                                    <th>Giá (VNĐ)</th>
                                    <th>Tồn kho</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="6" class="text-center text-muted">Vui lòng nhập điều kiện và bấm Tìm kiếm.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Sản phẩm</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="productId">
                        
                        <h6 class="text-primary border-bottom pb-2">Thông tin chung (Bảng products)</h6>
                        <div class="mb-3">
                            <label class="form-label">Tên giày</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Thương hiệu</label>
                                <select class="form-select" id="brandId" required>
                                    <option value="">-- Chọn thương hiệu --</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Danh mục</label>
                                <select class="form-select" id="categoryId" required>
                                    <option value="">-- Chọn danh mục --</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Giá niêm yết</label>
                            <input type="number" class="form-control" id="price" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" id="description" rows="2"></textarea>
                        </div>

                        <h6 class="text-success border-bottom pb-2 mt-4">Chi tiết biến thể (Bảng product_details)</h6>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Size</label>
                                <select class="form-select" id="sizeId">
                                    <option value="">-- Chọn Size --</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Màu sắc</label>
                                <select class="form-select" id="colorId">
                                    <option value="">-- Chọn Màu --</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Số lượng tồn kho</label>
                                <input type="number" class="form-control" id="stockQuantity" value="0">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Link Ảnh Thumbnail</label>
                            <input type="text" class="form-control" id="thumbnailUrl" placeholder="https://link-anh.com/anh.jpg">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-success" id="btnSave">Lưu hệ thống</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
