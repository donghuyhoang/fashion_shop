<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; align-items: center; justify-content: center; height: 100vh; 
        }
        .login-card { 
            width: 100%; max-width: 420px; padding: 40px 30px; 
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            background: white; border: none;
        }
        .login-card .logo-icon {
            font-size: 3rem; color: #212529; text-align: center; margin-bottom: 15px;
        }
        .form-control:focus {
            border-color: #212529; box-shadow: 0 0 0 0.25rem rgba(33, 37, 41, 0.25);
        }
        .divider {
            display: flex; align-items: center; text-align: center; margin: 20px 0; color: #6c757d;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; border-bottom: 1px solid #dee2e6;
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-shoe-prints"></i></div>
        <h3 class="text-center fw-bold mb-4">Fashion Shop</h3>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Email đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-envelope"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Nhập email của bạn" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold shadow-sm">ĐĂNG NHẬP</button>
        </form>

        <div class="divider">Hoặc</div>

        <div class="text-center">
            <span class="text-muted">Bạn chưa có tài khoản?</span>
            <br>
            <a href="register.html" class="btn btn-outline-dark mt-2 w-100 py-2 fw-bold">ĐĂNG KÝ NGAY</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#loginForm").submit(function(e) {
                e.preventDefault();
                
                const payload = {
                    email: $("#username").val(),
                    password: $("#password").val()
                };

                const $btn = $(this).find('button[type="submit"]');
                $btn.prop("disabled", true).html('<span class="spinner-border spinner-border-sm"></span> Đang xử lý...');

                $.ajax({
                    url: "http://localhost:8081/api/users/login",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(payload),
                    success: function(response) {
                        showNotification("Thành công", "Chào mừng trở lại Amber Obsidian.", "success");
                        
                        setTimeout(() => {
                            if (response.roleId === 1) { 
                                // ROLE 1: NHÂN VIÊN -> Vào trang Quản trị
                                localStorage.setItem("staff_token", "staff-token-" + response.userId);
                                window.location.href = "adminpage.html"; 
                            } else if (response.roleId === 2) { 
                                // ROLE 2: KHÁCH HÀNG -> Trở lại trang chủ mua sắm
                                localStorage.setItem("user_token", "user-token-" + response.userId);
                                window.location.href = "index.html"; 
                            } else {
                                showNotification("Lỗi quyền", "Tài khoản không hợp lệ.");
                                $btn.prop("disabled", false).text(originalText);
                            }
                        }, 1000);
                    },
                    error: function(xhr) {
                        alert(xhr.responseText || "Email hoặc mật khẩu không đúng. Vui lòng thử lại!");
                    },
                    complete: function() {
                        $btn.prop("disabled", false).text("ĐĂNG NHẬP");
                    }
                });
            });
        });
    </script>
</body>
</html>
