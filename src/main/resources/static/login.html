<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SNEAK PEAK</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        body {
            background: linear-gradient(-45deg, #0b0d11, #12141d, #0f1524, #172a68); /* Đổi sang màu nền trầm và tối hơn */
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            margin: 0;
            color: white;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-container {
            background-color: rgba(18, 21, 28, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 20px rgba(29, 78, 216, 0.15);
            position: relative;
            overflow: hidden;
            width: 850px;
            max-width: 100%;
            min-height: 640px;
        }

        /* --- NEW CSS FOR SLIDING ANIMATION --- */
        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.8s ease-in-out;
            width: 50%;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px 50px;
        }
        .form-container form { width: 100%; }

        .sign-in-container { 
            left: 0; 
            z-index: 2; 
            opacity: 1;
            pointer-events: auto;
        }
        .sign-up-container { 
            left: 0; 
            opacity: 0; 
            z-index: 1; 
            pointer-events: none;
        }

        .auth-container.right-panel-active .sign-in-container {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }
        .auth-container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.8s;
            pointer-events: auto;
        }

        @keyframes show {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.8s ease-in-out, border-radius 0.8s ease-in-out;
            z-index: 100;
            border-top-left-radius: 40px;
            border-bottom-left-radius: 40px;
        }

        .auth-container.right-panel-active .overlay-container{
            transform: translateX(-100%);
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
            border-top-right-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .overlay {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #FFFFFF;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.8s ease-in-out;
        }

        .auth-container.right-panel-active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.8s ease-in-out;
        }

        .overlay-left { transform: translateX(-20%); }
        .auth-container.right-panel-active .overlay-left { transform: translateX(0); }
        .overlay-right { right: 0; transform: translateX(0); }
        .auth-container.right-panel-active .overlay-right { transform: translateX(20%); }

        .overlay-panel h1 { 
            font-weight: 900; 
            letter-spacing: -1px; 
            margin: 0; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .overlay-panel h1 span {
            color: #12151c; /* Tạo điểm nhấn bằng màu tối cho chữ PEAK */
            font-weight: 600;
        }
        .overlay-panel p { 
            font-size: 0.95rem; 
            font-weight: 400; 
            line-height: 1.6; 
            color: #e2e8f0;
            margin: 15px 0 30px; 
        }

        /* Form styling adjustments */
        .form-title {
            font-weight: 900;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        .form-subtitle {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 2rem;
        }

        .input-group {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #3a3f4a;
            background-color: #1a1d24;
            transition: all 0.3s ease;
            margin-bottom: 0.8rem !important;
        }

        .input-group:focus-within {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.15);
            background-color: #1e2129;
            transform: translateY(-1px);
        }

        .input-group-text-custom {
            background: transparent;
            border: none;
            color: #6b7280;
            padding-left: 1.25rem;
            padding-right: 0.5rem;
            transition: color 0.3s ease;
        }

        .input-group:focus-within .input-group-text-custom i {
            color: #1d4ed8;
        }

        .form-control-custom {
            background: transparent;
            border: none;
            color: #fff;
            padding: 0.85rem 1rem 0.85rem 0.5rem;
            box-shadow: none !important;
            font-size: 0.95rem;
        }

        .form-control-custom:focus {
            background: transparent;
            color: #fff;
        }

        .form-control-custom::placeholder {
            color: #6b7280;
            font-weight: 500;
        }

        .btn-login-custom {
            background: linear-gradient(135deg, #1d4ed8, #1e3a8a); /* Nút bấm dùng gradient xanh trầm */
            border: none;
            color: white;
            border-radius: 12px;
            padding: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(29, 78, 216, 0.3);
            margin-top: 0.5rem;
        }

        .btn-login-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(29, 78, 216, 0.4);
            color: white;
        }

        button.ghost {
            background-color: transparent;
            border-color: #FFFFFF;
            border: 2px solid #fff;
            padding: 10px 45px;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button.ghost:hover {
            background-color: #fff;
            color: #1e40af;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        .hover-link {
            color: #9ca3af;
            transition: all 0.3s ease;
        }
        .hover-link:hover {
            color: #1d4ed8;
        }

        @media (max-width: 768px) {
            .auth-container { min-height: 650px; width: 95%; }
            .form-container { padding: 20px 30px; }
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

    <div class="auth-container" id="authContainer">
        
        <!-- FORM ĐĂNG KÝ -->
        <div class="form-container sign-up-container">
            <form id="registerForm">
                <h2 class="form-title" style="font-size: 1.8rem;">Create Account</h2>
                <p class="form-subtitle mb-3">Điền thông tin để tham gia cùng Sneak Peak</p>
                
                <div id="registerAlert" class="alert d-none small py-2 w-100 rounded-3 mb-2" role="alert"></div>
                
                <div class="w-100 text-start">
                    <label class="form-label text-muted fw-bold mb-1 ps-2" style="font-size: 0.65rem; letter-spacing: 1px;">HỌ VÀ TÊN</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control form-control-custom" id="regFullName" placeholder="Nhập họ và tên" required>
                    </div>
                </div>
                <div class="w-100 text-start">
                    <label class="form-label text-muted fw-bold mb-1 ps-2" style="font-size: 0.65rem; letter-spacing: 1px;">ĐỊA CHỈ EMAIL</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control form-control-custom" id="regEmail" placeholder="Nhập địa chỉ email" required>
                    </div>
                </div>
                <div class="w-100 text-start">
                    <label class="form-label text-muted fw-bold mb-1 ps-2" style="font-size: 0.65rem; letter-spacing: 1px;">SỐ ĐIỆN THOẠI</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom"><i class="fas fa-phone"></i></span>
                        <input type="text" class="form-control form-control-custom" id="regPhone" placeholder="Nhập số điện thoại" required>
                    </div>
                </div>
                <div class="w-100 text-start">
                    <label class="form-label text-muted fw-bold mb-1 ps-2" style="font-size: 0.65rem; letter-spacing: 1px;">MẬT KHẨU</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control form-control-custom" id="regPassword" placeholder="Tạo mật khẩu" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-login-custom w-100 fw-bold mt-2" style="letter-spacing: 1px;">ĐĂNG KÝ MỚI</button>
            </form>
        </div>
        
        <!-- FORM ĐĂNG NHẬP -->
        <div class="form-container sign-in-container">
            <form id="loginForm">
                <h2 class="form-title">Welcome Back</h2>
                <p class="form-subtitle mb-4">Vui lòng đăng nhập vào tài khoản của bạn</p>
                
                <div id="loginAlert" class="alert d-none small py-2 w-100 rounded-3" role="alert"></div>
                
                <div class="w-100 text-start">
                    <label class="form-label text-muted fw-bold mb-1 ps-2" style="font-size: 0.7rem; letter-spacing: 1px;">ĐỊA CHỈ EMAIL</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control form-control-custom" id="email" placeholder="Nhập địa chỉ email" required>
                    </div>
                </div>
                <div class="w-100 text-start">
                    <label class="form-label text-muted fw-bold mb-1 ps-2" style="font-size: 0.7rem; letter-spacing: 1px;">MẬT KHẨU CỦA BẠN</label>
                    <div class="input-group">
                        <span class="input-group-text input-group-text-custom"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control form-control-custom" id="password" placeholder="Nhập mật khẩu" required>
                    </div>
                </div>
                
                <a href="#" class="text-decoration-none small hover-link mb-4 mt-1 align-self-end d-block text-end">Quên mật khẩu?</a>
                
                <button type="submit" class="btn btn-login-custom w-100 fw-bold" id="btnLogin" style="letter-spacing: 1px;">ĐĂNG NHẬP</button>
            </form>
        </div>

        <!-- LỚP PHỦ CHUYỂN CẢNH -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <a href="index.html" class="text-white text-decoration-none">
                        <h1 class="fw-black" style="font-size: 2.5rem;">SNEAK<span>PEAK</span></h1>
                    </a>
                    <p class="mt-3">Đã có tài khoản?<br>Đăng nhập để tiếp tục hành trình của bạn.</p>
                    <button class="ghost mt-2" id="signIn">Đăng Nhập</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <a href="index.html" class="text-white text-decoration-none">
                        <h1 class="fw-black" style="font-size: 2.5rem;">SNEAK<span>PEAK</span></h1>
                    </a>
                    <p class="mt-3">Chưa có tài khoản?<br>Nhập thông tin cá nhân và bắt đầu ngay!</p>
                    <button class="ghost mt-2" id="signUp">Đăng Ký</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/auth.js"></script>
</body>
</html>
