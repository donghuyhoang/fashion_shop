<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">Quản Trị Viên</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label>Email / Số điện thoại</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label>Mật khẩu</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Đăng Nhập</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#loginForm").submit(function(e) {
                e.preventDefault();
                
                const payload = {
                    email: $("#username").val(),
                    password: $("#password").val()
                };

                const $btn = $(this).find('button[type="submit"]');
                $btn.prop("disabled", true).html('<span class="spinner-border spinner-border-sm"></span> Đang xử lý...');

                $.ajax({
                    url: "http://localhost:8081/api/users/login",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(payload),
                    success: function(response) {
                        alert("Đăng nhập thành công! Xin chào, " + response.fullName);
                        
                        // XỬ LÝ ĐIỀU HƯỚNG THEO ROLE ID
                        if (response.roleId === 1) {
                            // 1. Dành cho ADMIN
                            localStorage.setItem("admin_token", "admin-token-" + response.userId);
                            window.location.href = "index.html"; 
                            
                        } else if (response.roleId === 3) {
                            // 2. Dành cho STAFF (Nhân viên)
                            // Lưu token với tên khác để sau này dễ phân quyền ẩn/hiện nút xóa ở index.html nếu cần
                            localStorage.setItem("staff_token", "staff-token-" + response.userId);
                            window.location.href = "index.html"; 
                            
                        } else if (response.roleId === 2) {
                            // 3. Dành cho USER (Khách hàng)
                            localStorage.setItem("user_token", "user-token-" + response.userId);
                            window.location.href = "home.html"; // Chuyển ra trang mua sắm
                            
                        } else {
                            alert("Tài khoản của bạn chưa được cấp quyền truy cập!");
                        }
                    },
                    error: function(xhr) {
                        // Bắt lỗi 401 Unauthorized từ Backend
                        alert(xhr.responseText || "Email hoặc mật khẩu không đúng. Vui lòng thử lại!");
                    },
                    complete: function() {
                        $btn.prop("disabled", false).text("Đăng Nhập");
                    }
                });
            });
        });
    </script>
</body>
</html>
