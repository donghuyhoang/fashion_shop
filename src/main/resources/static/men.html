<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giày Nam - SNEAK PEAK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body style="background-color: #12151c; color: white;">

    <div class="toast-container-custom" id="toastBox"></div>

    <header class="main-navbar fixed-top">
        <div class="logo">
            <a href="index.html">SNEAK<span>PEAK</span></a>
        </div>
        <nav class="nav-links d-none d-lg-flex">
            <a href="index.html">HOME</a>
            <a href="men.html" class="active">MEN</a>
            <a href="women.html">WOMEN</a>
            <a href="collection.html">COLLECTION</a>
        </nav>
        
        <div class="nav-search d-none d-md-flex">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search shoes...">
        </div>

        <div class="nav-actions">
            <a href="cart.html" class="icon-link position-relative">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none; font-size: 0.6rem;">0</span>
            </a>
            <div id="userArea">
                <a href="login.html" class="login-btn"><i class="fas fa-user"></i> LOGIN</a>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 120px; min-height: 60vh;">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <h2 class="section-title m-0">SẢN PHẨM NAM <span class="fs-6 text-muted fw-normal d-block mt-1">Khám phá bộ sưu tập giày mạnh mẽ và phong cách dành riêng cho phái nam.</span></h2>
        </div>
        
        <div class="row g-4" id="menGrid">
            <div class="col-12 text-center text-muted"><i class="fas fa-spinner fa-spin fa-2x"></i> Đang tải dữ liệu...</div>
        </div>
    </div>

    <footer class="text-center py-4 mt-5" style="border-top: 1px solid #2a2d34;">
        <p class="text-muted small mb-0">&copy; 2026 SNEAK PEAK. All rights reserved.</p>
    </footer>

    <!-- Modal Quick Add -->
    <div class="modal fade dark-theme-modal" id="quickAddModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: #1e2129; border: 1px solid #3a3f4a;">
          <div class="modal-header border-bottom-0">
            <h5 class="modal-title text-light fw-bold" id="quickAddTitle">Tùy chọn giày</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body pt-0">
            <div id="quickAddOptions"></div>
          </div>
          <div class="modal-footer border-top-0">
            <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-primary-custom" id="btnConfirmQuickAdd" disabled>Thêm vào giỏ</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            const localImages = [
                "images/nike-air-max-90-infrared.jpg",
                "images/nike-air-force-1-low-white.jpg",
                "images/air-jordan-1-high-chicago.jpg",
                "images/nike-zoom-tempo-next-pink.jpg"
            ];

            $.ajax({
                url: "/api/products",
                type: "GET",
                success: function(allProducts) {
                    // Mẹo: Nếu bạn đã cấu hình categoryId cho Nam trong DB (VD: categoryId = 1), 
                    // bạn có thể đổi dòng dưới thành: const products = allProducts.filter(p => p.categoryId === 1);
                    const products = allProducts; 

                    if(products.length > 0) {
                        let html = "";
                        products.forEach(product => {
                            const realId = product.id || product.productId;
                            const imgSrc = product.thumb || product.imageUrl || product.image || localImages[realId % localImages.length];
                            
                            html += `
                                <div class="col-md-4 col-lg-3 mb-4">
                                    <div class="card h-100 product-card border-0 shadow-sm dark-card">
                                        <a href="product-detail.html?id=${realId}" class="product-img text-decoration-none d-block">
                                            <img src="${imgSrc}" alt="${product.name}">
                                        </a>
                                        <div class="card-body d-flex flex-column">
                                            <a href="product-detail.html?id=${realId}" class="text-decoration-none text-light">
                                                <h6 class="product-name text-truncate" title="${product.name}">${product.name}</h6>
                                            </a>
                                            <p class="product-category">${product.brandName || 'Sneaker'}</p>
                                            <div class="d-flex justify-content-between align-items-center mt-auto">
                                                <h5 class="product-price mb-0">${product.price ? product.price.toLocaleString('vi-VN') : 0} ₫</h5>
                                                <button class="btn-buy" data-id="${realId}" title="Thêm vào giỏ">
                                                    <i class="fas fa-shopping-cart"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        $('#menGrid').html(html);
                    } else {
                        $('#menGrid').html('<div class="col-12 text-center text-muted mt-5"><h5>Chưa có sản phẩm nào!</h5></div>');
                    }
                },
                error: function() {
                    $('#menGrid').html('<div class="col-12 text-center text-danger mt-5"><h5>Không thể kết nối đến máy chủ!</h5></div>');
                }
            });
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
