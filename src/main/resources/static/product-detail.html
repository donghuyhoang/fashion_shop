<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - SNEAK PEAK</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>
    <div class="toast-container-custom" id="toastBox"></div>

    <!-- Kế thừa Navbar của style chung -->
    <header class="main-navbar fixed-top">
        <div class="logo"><a href="index.html">SNEAK<span>PEAK</span></a></div>
        <nav class="nav-links d-none d-lg-flex">
                <a href="index.html">NEW ARRIVALS</a>
                <a href="category.html?id=1">RUNNING</a>
                <a href="category.html?id=2">FOOTBALL</a>
                <a href="category.html?id=3">BASKETBALL</a>
                <a href="category.html?id=4">SNEAKERS</a>
        </nav>
        <div class="nav-search d-none d-md-flex"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search shoes..."></div>
        <div class="nav-actions">
            <a href="cart.html" class="icon-link position-relative"><i class="fa-solid fa-cart-shopping"></i></a>
            <div id="userArea"><a href="login.html" class="login-btn"><i class="fas fa-user"></i> LOGIN</a></div>
        </div>
    </header>

    <!-- KHUNG CHI TIẾT SẢN PHẨM -->
    <div class="container product-detail-container">
        <div class="row g-5">
            <div class="col-lg-7">
                <div class="d-flex flex-column flex-lg-row gap-3 align-items-start">
                    <div class="flex-grow-1 w-100">
                        <div id="productCarousel" class="carousel slide" data-bs-ride="carousel">
                            <div class="carousel-inner rounded-4 shadow-sm border" id="carouselInner" style="background: #1e2129; border-color: #3a3f4a !important; height: 500px; display: flex; align-items: center;">
                                <div class="carousel-item active w-100 h-100 d-flex justify-content-center align-items-center p-4">
                                    <img id="pdMainImage" src="" class="d-block" style="max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6));" alt="Loading...">
                                </div>
                            </div>
                            <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon" aria-hidden="true" style="filter: invert(1);"></span><span class="visually-hidden">Previous</span></button>
                            <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next"><span class="carousel-control-next-icon" aria-hidden="true" style="filter: invert(1);"></span><span class="visually-hidden">Next</span></button>
                        </div>
                        <!-- Thanh cuộn hình thu nhỏ ở dưới cùng -->
                        <div class="d-flex gap-2 mt-3 overflow-auto custom-scrollbar-hide" id="carouselThumbnails" style="padding-bottom: 10px;"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-5 product-info">
                <div class="product-brand" id="pdBrand">ĐANG TẢI...</div>
                <h1 id="pdName">Đang tải sản phẩm...</h1>
                <div class="product-price" id="pdPrice">0 ₫</div>
                
                <div class="mb-4">
                    <div class="section-label">Màu sắc</div>
                    <div id="pdColorOptions" class="d-flex flex-wrap"><span class="text-muted"><i class="fas fa-spinner fa-spin"></i> Đang tải...</span></div>
                </div>

                <div class="mb-4">
                    <div class="section-label">Kích cỡ</div>
                    <div id="pdSizeOptions" class="d-flex flex-wrap"><span class="text-muted"><i class="fas fa-spinner fa-spin"></i> Đang tải...</span></div>
                </div>

                <div id="pdStockStatus" class="mb-3 text-info fw-bold"><i class="fas fa-info-circle me-1"></i> Vui lòng chọn Màu sắc và Kích cỡ</div>

                <button id="pdBtnAddToCart" class="btn-add-to-cart" disabled>
                    <i class="fas fa-shopping-cart me-2"></i> THÊM VÀO GIỎ HÀNG
                </button>

                <div class="product-desc" id="pdDescription">Đang tải mô tả...</div>
            </div>
        </div>
    </div>

    <!-- PHẦN SẢN PHẨM GỢI Ý MANG TỪ FILE CŨ SANG -->
    <div class="container mb-5 pb-5 mt-5 pt-4">
        <h3 class="fw-black mb-4 border-bottom border-secondary pb-3" style="font-family: 'Montserrat', sans-serif; color: #fafbfc;">CÓ THỂ BẠN SẼ THÍCH</h3>
        <div class="row g-4" id="suggestedProductsGrid">
            <div class="col-12 text-center text-muted"><i class="fas fa-spinner fa-spin"></i> Đang tải gợi ý...</div>
        </div>
    </div>

    <footer class="text-center py-4 mt-5" style="border-top: 1px solid #2a2d34;">
        <p class="text-muted small mb-0">&copy; 2026 SNEAK PEAK. All rights reserved.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/product-detail.js"></script>
</body>
</html>
