<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm - SNEAK PEAK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
    <link rel="stylesheet" href="css/pages.css"> 
    
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Montserrat', sans-serif; }
        
        /* Cấu trúc Ảnh */
        .main-img-box { background-color: #1a1d24; border-radius: 16px; border: 1px solid #2a2d34; transition: 0.3s; overflow: hidden; }
        .main-img-box img { width: 100%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4)); transition: 0.3s ease-in-out; }
        
        /* Chữ và Giá */
        .product-title { font-weight: 900; font-size: 2.5rem; letter-spacing: -1px; margin-top: 10px; }
        .price-current { font-weight: 900; font-size: 1.8rem; color: #10b981; }
        .desc-text { color: #d4d4d8; font-size: 0.95rem; line-height: 1.8; margin-bottom: 20px; }
        
        /* Khung chọn Màu và Size */
        .color-box, .size-box { 
            background: #27272a; border: 1px solid #3a3f4a; color: white; text-align: center; 
            padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; min-width: 60px;
        }
        .color-box:hover, .size-box:hover { background: #3f3f46; }
        .color-box.active, .size-box.active { border-color: #10b981; background: #064e3b; color: #10b981; }

        /* Nút Đặt Hàng */
        .btn-gradient { background: #10b981; color: white; width: 100%; border: none; padding: 18px; border-radius: 8px; font-weight: 800; letter-spacing: 1px; transition: 0.3s; font-size: 1.1rem; }
        .btn-gradient:hover { background: #0e9f6e; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        /* Khung Ảnh Mini (Thumbnails) */
        .thumb-img { opacity: 0.5; transition: 0.3s; }
        .thumb-img:hover { opacity: 1; transform: translateY(-2px); }
        .thumb-img.active { opacity: 1; border-color: #10b981 !important; }
    </style>
</head>
<body>
    <div class="toast-container-custom" id="toastBox"></div>

    <header class="main-navbar fixed-top" style="background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #27272a;">
        <div class="logo"><a href="index.html">SNEAK<span>PEAK</span></a></div>
        <div class="nav-actions">
            <button id="themeToggle" class="btn btn-link text-decoration-none p-0 me-3" style="color: inherit; border: none; box-shadow: none;">
                <i class="fas fa-moon fs-5"></i>
            </button>
            <a href="cart.html" class="icon-link position-relative">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none; font-size: 0.6rem;">0</span>
            </a>
            <div id="userArea"><a href="login.html" class="login-btn"><i class="fas fa-user"></i> LOGIN</a></div>
        </div>
    </header>

    <div class="container" style="margin-top: 120px; margin-bottom: 60px;" id="productDetailContainer">
        <div class="row">
            <div class="col-lg-6 mb-4">
                <div id="productCarousel" class="carousel slide main-img-box shadow-lg" data-bs-ride="carousel" style="height: 500px;">
                    <div class="carousel-inner h-100" id="carouselInner">
                        <div class="w-100 h-100 d-flex justify-content-center align-items-center">
                            <i class="fas fa-spinner fa-spin fa-3x text-muted"></i>
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#productCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#productCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="d-flex justify-content-center mt-4 gap-3 flex-wrap" id="carouselThumbnails"></div>
            </div>

            <div class="col-lg-6 px-lg-5">
                <h6 class="text-secondary text-uppercase fw-bold mb-1" id="pdBrand">Đang tải...</h6>
                <h1 class="product-title" id="pdName">Đang tải...</h1>
                <div class="mb-3 mt-2"><span class="price-current" id="pdPrice">0 ₫</span></div>
                <p class="desc-text" id="pdDescription">Đang tải mô tả sản phẩm...</p>
                
                <h6 class="fw-bold mb-3 mt-4 text-secondary">CHỌN MÀU SẮC</h6>
                <div class="d-flex flex-wrap gap-2 mb-4" id="pdColorOptions"></div>

                <h6 class="fw-bold mb-3 mt-4 text-secondary">CHỌN SIZE (EU)</h6>
                <div class="d-flex flex-wrap gap-2 mb-4" id="pdSizeOptions"></div>

                <div id="pdStockStatus" class="mt-3 mb-3 fw-bold"></div>

                <button class="btn-gradient btn-buy mt-3" id="pdBtnAddToCart" disabled>
                    <i class="fas fa-shopping-cart me-2"></i> THÊM VÀO GIỎ HÀNG
                </button>
            </div>
        </div>
    </div>

    <div class="container mb-5 pb-5">
        <h3 class="fw-black mb-4 border-bottom border-secondary pb-3">CÓ THỂ BẠN SẼ THÍCH</h3>
        <div class="row g-4" id="suggestedProductsGrid"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/theme-handler.js"></script>
    <script src="js/app.js"></script>
    <script src="js/product-detail.js"></script>
</body>
</html>
