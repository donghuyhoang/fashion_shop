<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm - SNEAK PEAK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
    
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Montserrat', sans-serif; }
        
        /* Cấu trúc Ảnh */
        .main-img-box { background-color: #1a1d24; border-radius: 16px; padding: 40px; text-align: center; border: 1px solid #2a2d34; }
        .main-img-box img { width: 100%; max-width: 500px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4)); }
        
        /* Chữ và Giá */
        .product-title { font-weight: 900; font-size: 2.5rem; letter-spacing: -1px; margin-top: 10px; }
        .price-current { font-weight: 900; font-size: 1.8rem; color: #10b981; }
        .desc-text { color: #d4d4d8; font-size: 0.95rem; line-height: 1.8; margin-bottom: 20px; }
        
        /* Khung chọn Màu */
        .color-options { display: flex; gap: 15px; margin-bottom: 25px; }
        .color-box { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .color-box:hover { transform: scale(1.1); }
        .color-box.active { border-color: #10b981; outline: 2px solid #fff; transform: scale(1.1); }

        /* Khung chọn Size */
        .size-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 30px; }
        .size-box { background: #27272a; border: 1px solid #3a3f4a; color: white; text-align: center; padding: 12px 0; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .size-box:hover { background: #3f3f46; }
        .size-box.active { border-color: #10b981; background: #064e3b; color: #10b981; }
        
        /* Nút Đặt Hàng */
        .btn-gradient { background: #10b981; color: white; width: 100%; border: none; padding: 18px; border-radius: 8px; font-weight: 800; letter-spacing: 1px; transition: 0.3s; font-size: 1.1rem; }
        .btn-gradient:hover { background: #0e9f6e; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body>
    <div class="toast-container-custom" id="toastBox"></div>

    <header class="main-navbar fixed-top" style="background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #27272a;">
        <div class="logo">
            <a href="index.html">SNEAK<span>PEAK</span></a>
        </div>
        <div class="nav-search d-none d-md-flex">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search shoes...">
        </div>
        <div class="nav-actions">
            <a href="cart.html" class="icon-link position-relative">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display:none; font-size: 0.6rem;">0</span>
            </a>
            <div id="userArea"><a href="login.html" class="login-btn"><i class="fas fa-user"></i> LOGIN</a></div>
        </div>
    </header>

    <div class="container" style="margin-top: 120px; margin-bottom: 60px;" id="productDetailContainer">
        <div class="text-center text-muted py-5"><i class="fas fa-spinner fa-spin fa-3x mb-3"></i><p>Đang tải thông tin sản phẩm...</p></div>
    </div>

    <div class="container mb-5 pb-5">
        <h3 class="fw-black mb-4 border-bottom border-secondary pb-3" style="font-family: 'Montserrat', sans-serif;">CÓ THỂ BẠN SẼ THÍCH</h3>
        <div class="row g-4" id="suggestedProductsGrid">
            </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="app.js"></script>

    <script>
        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlId = urlParams.get('id');

            const localImages = [
                "images/nike-air-max-90-infrared.jpg",
                "images/nike-air-force-1-low-white.jpg",
                "images/air-jordan-1-high-chicago.jpg",
                "images/nike-zoom-tempo-next-pink.jpg"
            ];

            $.ajax({
                url: "/api/products", 
                type: "GET",
                success: function(products) {
                    // FIX LỖI "Chi tiết không hoạt động": Tìm theo id HOẶC productId
                    const product = products.find(p => (p.id == urlId) || (p.productId == urlId));

                    if (product) {
                        const realId = product.id || product.productId;
                        
                        // Áp dụng thuật toán ảnh 
                        const imgSrc = product.thumb || product.imageUrl || product.image || localImages[realId % localImages.length]; 
                        const priceVND = product.price ? product.price.toLocaleString('vi-VN') : "0";
                        const description = product.description || `Siêu phẩm ${product.name} mang đến trải nghiệm tuyệt vời với thiết kế thời thượng và chất liệu cao cấp. Sự lựa chọn hoàn hảo cho phong cách Hypebeast.`;

                        $('#productDetailContainer').html(`
                            <div class="row">
                                <div class="col-lg-6 mb-4">
                                    <div class="main-img-box shadow-lg"><img src="${imgSrc}" alt="${product.name}"></div>
                                </div>
                                <div class="col-lg-6 px-lg-5">
                                    <h6 class="text-secondary text-uppercase fw-bold mb-1">${product.brandName || "Sneaker Peak"}</h6>
                                    <h1 class="product-title">${product.name}</h1>
                                    <div class="mb-3 mt-2"><span class="price-current">${priceVND} ₫</span></div>
                                    <p class="desc-text">${description}</p>
                                    
                                    <h6 class="fw-bold mb-3">CHỌN MÀU SẮC: <span id="selectedColorName" class="text-success fw-normal">Trắng Basic</span></h6>
                                    <div class="color-options">
                                        <div class="color-box active" style="background-color: #f8f9fa;" data-color="Trắng Basic"></div>
                                        <div class="color-box" style="background-color: #121212;" data-color="Đen Obsidian"></div>
                                        <div class="color-box" style="background-color: #dc2626;" data-color="Đỏ Chicago"></div>
                                    </div>

                                    <h6 class="fw-bold mb-3 mt-4">CHỌN SIZE (EU): <span id="selectedSize" class="text-success fw-normal">40</span></h6>
                                    <div class="size-grid">
                                        <div class="size-box">39</div><div class="size-box active">40</div><div class="size-box">41</div><div class="size-box">42</div>
                                    </div>

                                    <div class="dark-card" style="background:none; border:none; padding:0;">
                                        <h6 class="product-name d-none">${product.name}</h6>
                                        <button class="btn-gradient btn-buy mt-3" data-id="${realId}">
                                            <i class="fas fa-shopping-cart me-2"></i> THÊM VÀO GIỎ HÀNG
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `);
                    } else {
                        $('#productDetailContainer').html('<div class="col-12 text-center text-danger"><h3>Sản phẩm không tồn tại!</h3></div>');
                    }
                    // --- BỔ SUNG CODE SẢN PHẨM GỢI Ý VÀO ĐÂY ---
                    const suggested = products.filter(p => p.id != urlId).slice(0, 4); 
                    if(suggested.length > 0) {
                        let suggestHtml = "";
                        suggested.forEach(p => {
                            // Dùng đúng biến p.thumb theo chuẩn ProductDTO của bạn
                            const pImg = p.thumb || "images/nike-air-force-1-low-white.jpg";
                            
                            suggestHtml += `
                                <div class="col-md-3">
                                    <div class="card h-100 product-card border-0 shadow-sm dark-card">
                                        <a href="product-detail.html?id=${p.id}" class="product-img text-decoration-none d-block">
                                            <img src="${pImg}" alt="${p.name}">
                                        </a>
                                        <div class="card-body d-flex flex-column">
                                            <a href="product-detail.html?id=${p.id}" class="text-decoration-none text-light">
                                                <h6 class="product-name text-truncate">${p.name}</h6>
                                            </a>
                                            <h6 class="mt-auto pt-3 text-success">${p.price ? p.price.toLocaleString('vi-VN') : 0} ₫</h6>
                                        </div>
                                    </div>
                                </div>`;
                        });
                        $('#suggestedProductsGrid').html(suggestHtml);
                    }
                    // -------------------------------------------
                }
            });

            // Hiệu ứng click Màu và Size
            $(document).on('click', '.color-box', function() {
                $('.color-box').removeClass('active'); $(this).addClass('active');
                $('#selectedColorName').text($(this).data('color'));
            });
            $(document).on('click', '.size-box', function() {
                $('.size-box').removeClass('active'); $(this).addClass('active');
                $('#selectedSize').text($(this).text());
            });
        });
    </script>
</body>
</html>
