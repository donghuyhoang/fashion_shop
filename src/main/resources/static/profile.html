<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .card-profile { border: none; border-radius: 15px; overflow: hidden; }
        .profile-header { background: #212529; height: 100px; }
        .avatar-container { margin-top: -50px; }
        .avatar-main { width: 100px; height: 100px; border-radius: 50%; border: 5px solid white; background: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-shoe-prints text-warning"></i> THT - SHOP</a>
            <a href="index.html" class="btn btn-outline-light btn-sm">Quay lại trang chủ</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-profile shadow-lg">
                    <div class="profile-header"></div>
                    <div class="card-body text-center p-4">
                        <div class="avatar-container mb-3">
                            <img id="displayAvatar" src="" class="avatar-main shadow">
                        </div>
                        <h3 id="displayName" class="fw-bold mb-1">...</h3>
                        <p id="displayEmail" class="text-muted mb-4">...</p>
                        
                        <div class="text-start border-top pt-4">
                            <h6 class="fw-bold text-uppercase small text-primary mb-3">Thông tin liên hệ</h6>
                            <div class="mb-3">
                                <label class="small text-muted d-block">Địa chỉ giao hàng</label>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-map-marker-alt text-danger me-2"></i>
                                    <span id="displayAddress">Chưa cập nhật địa chỉ</span>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="small text-muted d-block">Số điện thoại</label>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-phone text-success me-2"></i>
                                    <span id="displayPhone">Chưa cập nhật số điện thoại</span>
                                </div>
                            </div>
                            <button class="btn btn-dark w-100 fw-bold py-2">Chỉnh sửa hồ sơ</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Lấy dữ liệu từ localStorage
            const name = localStorage.getItem("user_name");
            const email = localStorage.getItem("user_email");

            if (!name) {
                window.location.href = "login.html";
                return;
            }

            // Hiển thị lên giao diện
            $("#displayName").text(name);
            $("#displayEmail").text(email);
            $("#displayAvatar").attr("src", `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random&size=200`);
        });
    </script>
</body>
</html>
