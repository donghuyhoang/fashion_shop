<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi - SNEAK PEAK</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="main-navbar">
        <div class="logo">
            <a href="index.html">SNEAK<span>PEAK</span></a>
        </div>
        <div class="nav-actions ms-auto">
            <a href="index.html" class="btn btn-outline-custom btn-sm"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
        </div>
    </nav>

    <div class="container profile-container mt-5">
        <div class="profile-card">
            <h2 class="section-title text-center mb-4">Hồ sơ của tôi</h2>
            <div id="alertMessage" class="alert d-none" role="alert"></div>
            
            <form id="profileForm">
                <div class="mb-4">
                    <label for="fullName" class="form-label">Họ và Tên</label>
                    <input type="text" class="form-control-custom w-100" id="fullName" name="fullName" required>
                </div>
                <div class="mb-4">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control-custom w-100" id="email" name="email" required>
                </div>
                <div class="mb-4">
                    <label for="phone" class="form-label">Số điện thoại</label>
                    <input type="tel" class="form-control-custom w-100" id="phone" name="phone" required>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mt-5">
                    <button type="button" class="btn btn-outline-warning" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                        <i class="fas fa-key me-2"></i> Đổi mật khẩu
                    </button>
                    
                    <div class="d-flex gap-3">
                        <a href="index.html" class="btn btn-outline-custom">Quay lại</a>
                        <button type="submit" class="btn btn-primary-custom px-4" id="btnUpdateProfile">
                            <i class="fas fa-save me-2"></i> Lưu Thay Đổi
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Đổi Mật Khẩu -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: #1e2129; border: 1px solid #3a3f4a;">
          <div class="modal-header border-0">
            <h5 class="modal-title text-light">Đổi Mật Khẩu</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div id="modalAlertMessage" class="alert d-none" role="alert"></div>
            <form id="changePasswordForm">
                <div class="mb-3">
                    <label class="form-label text-light">Mật khẩu hiện tại</label>
                    <input type="password" class="form-control-custom w-100" id="oldPassword" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">Mật khẩu mới</label>
                    <input type="password" class="form-control-custom w-100" id="newPassword" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-light">Xác nhận mật khẩu mới</label>
                    <input type="password" class="form-control-custom w-100" id="confirmPassword" required>
                </div>
                <div class="text-end mt-4">
                    <button type="button" class="btn btn-outline-secondary me-2" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary-custom" id="btnSubmitPassword">Xác nhận đổi</button>
                </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
