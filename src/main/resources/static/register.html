<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>
    <div class="register-card">
        <h3 class="text-center mb-4">Tạo Tài Khoản</h3>
        <form id="registerForm">
            <div class="mb-3">
                <label>Họ và tên</label>
                <input type="text" class="form-control" id="regFullName" required>
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" id="regEmail" required>
            </div>
            <div class="mb-3">
                <label>Số điện thoại</label>
                <input type="text" class="form-control" id="regPhone" required>
            </div>
            <div class="mb-3">
                <label>Mật khẩu</label>
                <input type="password" class="form-control" id="regPassword" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Đăng Ký Ngay</button>
            <div class="text-center mt-3">
                <a href="login.html" class="text-decoration-none">Đã có tài khoản? Đăng nhập</a>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#registerForm").submit(function(e) {
                e.preventDefault();
                
                // Thu thập dữ liệu từ Form gửi cho DTO
                const payload = {
                    fullName: $("#regFullName").val(),
                    email: $("#regEmail").val(),
                    phoneNumber: $("#regPhone").val(),
                    password: $("#regPassword").val()
                };

                const $btn = $(this).find('button[type="submit"]');
                $btn.prop("disabled", true).text("Đang xử lý...");

                $.ajax({
                    url: "http://localhost:8081/api/users/register",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(payload),
                    success: function(response) {
                        alert(response); // Hiện chữ "Đăng ký tài khoản thành công!"
                        window.location.href = "login.html"; // Đá người dùng về trang đăng nhập
                    },
                    error: function(xhr) {
                        alert(xhr.responseText || "Đã xảy ra lỗi hệ thống!");
                    },
                    complete: function() {
                        $btn.prop("disabled", false).text("Đăng Ký Ngay");
                    }
                });
            });
        });
    </script>
</body>
</html>
