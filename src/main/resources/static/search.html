<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Tìm Kiếm - SNEAK PEAK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body style="background-color: #12151c; color: white;">

    <div class="toast-container-custom" id="toastBox"></div>

    <header class="main-navbar fixed-top">
        <div class="logo">
            <a href="index.html">SNEAK<span>PEAK</span></a>
        </div>
        <nav class="nav-links d-none d-lg-flex">
            <a href="index.html">HOME</a>
            <a href="men.html">MEN</a>
            <a href="women.html">WOMEN</a>
            <a href="collection.html">COLLECTION</a>
        </nav>
        
        <div class="nav-search d-none d-md-flex">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search shoes...">
        </div>

        <div class="nav-actions">
            <a href="cart.html" class="icon-link position-relative">
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none; font-size: 0.6rem;">0</span>
            </a>
            <div id="userArea">
                <a href="login.html" class="login-btn"><i class="fas fa-user"></i> LOGIN</a>
            </div>
        </div>
    </header>

    <div class="container" style="margin-top: 120px; min-height: 60vh;">
        <h4 class="fw-bold mb-4" style="font-family: 'Montserrat', sans-serif;">KẾT QUẢ TÌM KIẾM CHO: <span id="searchKeyword" class="text-warning"></span></h4>
        
        <div class="row g-4" id="searchResultsGrid">
            <div class="col-12 text-center text-muted"><i class="fas fa-spinner fa-spin fa-2x"></i> Đang tìm kiếm...</div>
        </div>
    </div>

    <footer class="text-center py-4 mt-5" style="border-top: 1px solid #2a2d34;">
        <p class="text-muted small mb-0">&copy; 2026 SNEAK PEAK. All rights reserved.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const keyword = urlParams.get('keyword');
            
            // 1. Mảng ảnh dự phòng y hệt trang chủ
            const localImages = [
                "images/nike-air-max-90-infrared.jpg",
                "images/nike-air-force-1-low-white.jpg",
                "images/air-jordan-1-high-chicago.jpg",
                "images/nike-zoom-tempo-next-pink.jpg"
            ];

            if(keyword) {
                $('#searchKeyword').text('"' + keyword + '"');
                
                $.ajax({
                    url: "/api/products",
                    type: "GET",
                    success: function(products) {
                        const filtered = products.filter(p => p.name.toLowerCase().includes(keyword.toLowerCase()));
                        
                        if(filtered.length > 0) {
                            let html = "";
                            filtered.forEach(product => {
                                // 2. Lấy ID thật (Phòng trường hợp Java trả về productId thay vì id)
                                const realId = product.id || product.productId;
                                
                                // 3. Áp dụng thuật toán gán ảnh quay vòng y hệt app.js
                                const imgSrc = product.thumb || product.imageUrl || product.image || localImages[realId % localImages.length];
                                
                                html += `
                                    <div class="col-md-4 col-lg-3 mb-4">
                                        <div class="card h-100 product-card border-0 shadow-sm dark-card">
                                            <a href="product-detail.html?id=${realId}" class="product-img text-decoration-none d-block">
                                                <img src="${imgSrc}" alt="${product.name}">
                                            </a>
                                            <div class="card-body d-flex flex-column">
                                                <a href="product-detail.html?id=${realId}" class="text-decoration-none text-light">
                                                    <h6 class="product-name text-truncate" title="${product.name}">${product.name}</h6>
                                                </a>
                                                <p class="product-category">${product.brandName || 'Sneaker'}</p>
                                                <div class="d-flex justify-content-between align-items-center mt-auto">
                                                    <h5 class="product-price mb-0">${product.price ? product.price.toLocaleString('vi-VN') : 0} ₫</h5>
                                                    <button class="btn-buy" data-id="${realId}" title="Thêm vào giỏ">
                                                        <i class="fas fa-shopping-cart"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            });
                            $('#searchResultsGrid').html(html);
                        } else {
                            $('#searchResultsGrid').html('<div class="col-12 text-center text-muted mt-5"><h5>Không tìm thấy sản phẩm!</h5></div>');
                        }
                    }
                });
            }
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
